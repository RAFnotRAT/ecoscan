<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4caf50">
    <title>EcoScan - Tri Selectif</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #1b5e20;
            min-height: 100vh;
            padding-bottom: 30px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 { 
            font-size: 32px; 
            color: #2e7d32;
            margin-bottom: 10px;
        }
        .header p { 
            font-size: 14px; 
            color: #666;
            line-height: 1.5;
        }
        
        .search-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .search-box h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            margin-bottom: 10px;
        }
        .search-input:focus { border-color: #4caf50; }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-green { background: #4caf50; color: white; }
        .btn-red { background: #ef5350; color: white; }
        .btn-green:active { background: #43a047; }
        .btn-red:active { background: #e53935; }
        
        .photo-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .photo-box h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
        }
        .upload-area {
            border: 3px dashed #4caf50;
            border-radius: 15px;
            padding: 40px 20px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .upload-area:active { transform: scale(0.98); }
        .upload-area .icon { font-size: 50px; }
        .upload-area p { color: #888; margin-top: 10px; }
        .upload-area img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .result-card .icon { font-size: 60px; margin-bottom: 10px; }
        .result-card .bin-name { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .result-card .desc { font-size: 14px; color: #666; margin-bottom: 10px; }
        .result-card .tips { font-size: 13px; color: #888; font-style: italic; }
        .result-card .ai-badge {
            background: #9c27b0;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .yellow { background: linear-gradient(135deg, #fff9c4, #fff176); border: 3px solid #fbc02d; }
        .blue { background: linear-gradient(135deg, #bbdefb, #90caf9); border: 3px solid #1976d2; }
        .green { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); border: 3px solid #4caf50; }
        .brown { background: linear-gradient(135deg, #d7ccc8, #bcaaa4); border: 3px solid #795548; }
        .gray { background: linear-gradient(135deg, #eceff1, #cfd8dc); border: 3px solid #607d8b; }
        .orange { background: linear-gradient(135deg, #ffe0b2, #ffcc80); border: 3px solid #f57c00; }
        
        .examples {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .examples h3 {
            font-size: 16px;
            color: #2e7d32;
            margin-bottom: 15px;
        }
        .examples-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .example-item {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px 5px;
            text-align: center;
        }
        .example-item .emoji { font-size: 30px; }
        .example-item .name { font-size: 11px; margin-top: 5px; color: #666; }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EcoScan</h1>
            <p>Envoie une photo d'un objet ou cherche son nom,<br>l'IA te dira dans quelle poubelle le trier !</p>
        </div>
        
        <div class="search-box">
            <h3>Recherche par texte</h3>
            <input type="text" class="search-input" id="searchInput" placeholder="Ex: bouteille plastique, journal, peau de banane...">
            <button class="btn btn-green" onclick="searchWithAI()">&#128640; Rechercher</button>
        </div>
        
        <div class="photo-box">
            <h3>Ou envoie une photo</h3>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="icon">&#128247;</div>
                <p>Cliquez pour choisir une photo</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
            <div id="previewArea"></div>
            <div id="loadingArea"></div>
            <div id="resultArea"></div>
        </div>
        
        <div class="examples">
            <h3>Exemples d'objets</h3>
            <div class="examples-grid">
                <div class="example-item"><div class="emoji">&#128154;</div><div class="name">Bouteille</div></div>
                <div class="example-item"><div class="emoji">&#128240;</div><div class="name">Journal</div></div>
                <div class="example-item"><div class="emoji">&#129389;</div><div class="name">Bocal</div></div>
                <div class="example-item"><div class="emoji">&#127822;</div><div class="name">Banane</div></div>
                <div class="example-item"><div class="emoji">&#128684;</div><div class="name">Cigarette</div></div>
                <div class="example-item"><div class="emoji">&#128187;</div><div class="name">Ordinateur</div></div>
            </div>
        </div>
        
        <div class="footer">
            EcoScan - Projet SVT
        </div>
    </div>
    
    <script>
        let selectedImage = null;
        
        const DB = {
            yellow: { name: 'Poubelle Jaune', icon: '&#128462;', tips: 'Videz et aplatissez. Retirez les films.' },
            blue: { name: 'Poubelle Bleue', icon: '&#128462;', tips: 'Ne pas froisser. Pas de papier sale.' },
            green: { name: 'Poubelle Verte', icon: '&#128462;', tips: 'Retirez les bouchons. Ne cassez pas.' },
            brown: { name: 'Poubelle Brune', icon: '&#128462;', tips: 'Utilisez un sac compostable.' },
            gray: { name: 'Poubelle Grise', icon: '&#128462;', tips: 'Dernier recours.' },
            orange: { name: 'Dechets Speciaux', icon: '&#9888;', tips: 'Aller en dechetterie.' }
        };
        
        const HF_SPACE_URL = "https://rafnotrat-projet-svt.hf.space";
        
        const BIN_MAP = {
            'Jaune': 'yellow', 'Bleu': 'blue', 'Vert': 'green',
            'Brun': 'brown', 'Gris': 'gray', 'Orange': 'orange'
        };
        
        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                selectedImage = e.target.result;
                document.getElementById('uploadArea').innerHTML = `<img src="${selectedImage}" alt="Preview">`;
                document.getElementById('previewArea').innerHTML = `
                    <button class="btn btn-green" onclick="analyzeWithAI()">&#128640; Analyser</button>
                    <button class="btn btn-red" onclick="resetPhoto()" style="margin-top:10px">Annuler</button>
                `;
                document.getElementById('resultArea').innerHTML = '';
            };
            reader.readAsDataURL(file);
        }
        
        function resetPhoto() {
            selectedImage = null;
            document.getElementById('uploadArea').innerHTML = '<div class="icon">&#128247;</div><p>Cliquez pour choisir une photo</p>';
            document.getElementById('previewArea').innerHTML = '';
            document.getElementById('loadingArea').innerHTML = '';
            document.getElementById('resultArea').innerHTML = '';
        }
        
        async function analyzeWithAI() {
            if (!selectedImage) return;
            
            document.getElementById('previewArea').innerHTML = '';
            document.getElementById('loadingArea').innerHTML = `
                <div class="spinner"></div>
                <p style="text-align:center;color:#888">Analyse en cours...</p>
            `;
            document.getElementById('resultArea').innerHTML = '';
            
            try {
                const base64Data = selectedImage.split(',')[1];
                const byteString = atob(base64Data);
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                const blob = new Blob([ab], { type: 'image/png' });
                
                const formData = new FormData();
                formData.append('files', blob, 'photo.png');
                
                const uploadResp = await fetch(`${HF_SPACE_URL}/gradio_api/upload`, { method: 'POST', body: formData });
                const uploadResult = await uploadResp.json();
                const filePath = uploadResult[0];
                
                const callResponse = await fetch(`${HF_SPACE_URL}/gradio_api/call/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [{ path: filePath }] })
                });
                
                const callData = await callResponse.json();
                const eventId = callData.event_id;
                
                const resultResponse = await fetch(`${HF_SPACE_URL}/gradio_api/call/predict/${eventId}`);
                const text = await resultResponse.text();
                
                document.getElementById('loadingArea').innerHTML = '';
                
                const dataLine = text.split('\n').find(l => l.startsWith('data: '));
                if (!dataLine) { alert('Erreur'); return; }
                
                const raw = JSON.parse(dataLine.substring(6));
                let result;
                try { result = JSON.parse(raw[0]); } catch { result = { poubelle: raw[1] }; }
                
                const bin = BIN_MAP[result.poubelle] || 'gray';
                const data = DB[bin];
                
                document.getElementById('resultArea').innerHTML = `
                    <div class="result-card ${bin}">
                        <span class="ai-badge">&#128640; Resultat IA</span>
                        <div class="icon">${data.icon}</div>
                        <div class="bin-name">${data.name}</div>
                        <div class="tips">${result.conseil || data.tips}</div>
                    </div>
                `;
                
            } catch (e) {
                document.getElementById('loadingArea').innerHTML = '';
                alert('Erreur: ' + e.message);
            }
        }
        
        async function searchWithAI() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { alert('Ecrivez un objet'); return; }
            
            document.getElementById('loadingArea').innerHTML = `
                <div class="spinner"></div>
                <p style="text-align:center;color:#888">Recherche...</p>
            `;
            document.getElementById('resultArea').innerHTML = '';
            
            try {
                const callResponse = await fetch(`${HF_SPACE_URL}/gradio_api/call/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [query] })
                });
                
                const callData = await callResponse.json();
                const eventId = callData.event_id;
                
                const resultResponse = await fetch(`${HF_SPACE_URL}/gradio_api/call/predict/${eventId}`);
                const text = await resultResponse.text();
                
                document.getElementById('loadingArea').innerHTML = '';
                
                const dataLine = text.split('\n').find(l => l.startsWith('data: '));
                if (!dataLine) { alert('Erreur'); return; }
                
                const raw = JSON.parse(dataLine.substring(6));
                let poubelle = raw[0] || raw[1] || '';
                let bin = 'gray';
                for (const [key, value] of Object.entries(BIN_MAP)) {
                    if (poubelle.includes(key)) {
                        bin = value;
                        break;
                    }
                }
                
                const data = DB[bin];
                
                document.getElementById('resultArea').innerHTML = `
                    <div class="result-card ${bin}">
                        <span class="ai-badge">&#128640; Resultat IA</span>
                        <div class="icon">${data.icon}</div>
                        <div class="bin-name">${data.name}</div>
                        <div class="tips">${data.tips}</div>
                    </div>
                `;
                
            } catch (e) {
                document.getElementById('loadingArea').innerHTML = '';
                alert('Erreur: ' + e.message);
            }
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchWithAI();
        });
    </script>
</body>
</html>
